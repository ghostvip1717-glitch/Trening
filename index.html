<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Accountability</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #252535;
  --accent: #6c5ce7;
  --green: #00d68f;
  --red: #ff4757;
  --yellow: #ffd32a;
  --orange: #ff9f43;
  --text: #eeeef5;
  --muted: #55556a;
  --neutral: #a0a0c0;
  --display: 'Unbounded', sans-serif;
  --body: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.screen { display: none; flex-direction: column; height: 100vh; }
.screen.active { display: flex; }

/* ONBOARDING */
#s-onboard {
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
}

.ob-flame { font-size: 52px; margin-bottom: 18px; filter: drop-shadow(0 0 20px #6c5ce7); }
.ob-title { font-family: var(--display); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.ob-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }

.role-btn {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.18s;
  text-align: left;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.role-btn:active { transform: scale(0.97); }
.role-icon { font-size: 26px; flex-shrink: 0; }
.role-text-name { font-family: var(--display); font-size: 13px; font-weight: 600; margin-bottom: 3px; color: var(--text); }
.role-text-desc { font-size: 11px; color: #8888aa; line-height: 1.4; }

.ob-waiting {
  font-size: 12px; color: var(--muted); margin-top: 16px;
  padding: 12px 20px; background: var(--surface);
  border-radius: 12px; border: 1px solid var(--border); display: none;
}

/* PIN */
#s-pin {
  align-items: center; justify-content: center; padding: 32px 24px;
}
.pin-title { font-family: var(--display); font-size: 16px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.pin-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; text-align: center; }
.pin-dots { display: flex; gap: 16px; margin-bottom: 32px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: all 0.15s; }
.pin-dot.filled { background: var(--accent); transform: scale(1.1); }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
.pin-key {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 18px; font-family: var(--display);
  font-size: 18px; font-weight: 600; color: var(--text);
  cursor: pointer; text-align: center; transition: all 0.1s; user-select: none;
}
.pin-key:active { background: var(--surface2); transform: scale(0.94); border-color: var(--accent); }
.pin-key.del { font-size: 14px; color: var(--muted); }
.pin-key.empty { background: transparent; border-color: transparent; pointer-events: none; }
.pin-error { color: var(--red); font-size: 12px; margin-top: -20px; margin-bottom: 16px; height: 16px; text-align: center; }

/* APP SHELL */
#s-app { flex-direction: column; overflow: hidden; }

.app-top {
  padding: 12px 20px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-wordmark { font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }
.role-pill { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; }
.pill-student { background: var(--accent); color: #fff; }
.pill-coach { background: var(--green); color: #000; }

.debt-display { text-align: center; padding: 2px 0 6px; }
.debt-label { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.debt-number { font-family: var(--display); font-size: 28px; font-weight: 700; line-height: 1; color: var(--neutral); }
.debt-rub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* TABS */
.tab-content { flex: 1; overflow-y: auto; padding: 14px 14px 80px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0; cursor: pointer; border: none;
  background: none; color: var(--muted); font-size: 10px;
  font-family: var(--body); transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; }

/* CARDS */
.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 13px 14px; margin-bottom: 10px;
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.card-name { font-size: 14px; font-weight: 600; flex: 1; margin-right: 8px; line-height: 1.3; }
.card-fine { font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--yellow); white-space: nowrap; }
.card-deadline { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.card-deadline.overdue { color: var(--red); }
.card-deadline.soon { color: var(--yellow); }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; letter-spacing: 0.04em;
}
.badge-wait { background: rgba(255,159,67,0.15); color: var(--orange); }
.badge-active { background: rgba(108,92,231,0.15); color: var(--accent); }
.badge-reported { background: rgba(255,211,42,0.12); color: var(--yellow); }
.badge-done { background: rgba(0,214,143,0.12); color: var(--green); }
.badge-failed { background: rgba(255,71,87,0.12); color: var(--red); }
.badge-burned { background: rgba(100,100,120,0.15); color: var(--muted); }

.card-actions { display: flex; gap: 8px; margin-top: 10px; }

/* BUTTONS */
.btn {
  border: none; border-radius: 12px; padding: 10px 14px;
  font-family: var(--body); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.12s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 15px; font-size: 14px; border-radius: 14px; }
.btn-green { background: rgba(0,214,143,0.12); color: var(--green); border: 1px solid rgba(0,214,143,0.3); flex: 1; }
.btn-red { background: rgba(255,71,87,0.12); color: var(--red); border: 1px solid rgba(255,71,87,0.3); flex: 1; }
.btn-orange { background: rgba(255,159,67,0.12); color: var(--orange); border: 1px solid rgba(255,159,67,0.3); flex: 1; }
.btn-ghost { background: var(--surface2); color: var(--text); flex: 1; }

.btn-fab {
  position: fixed; bottom: 72px; right: 18px;
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 24px;
  border: none; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(108,92,231,0.4);
  z-index: 40; transition: transform 0.15s;
}
.btn-fab:active { transform: scale(0.92); }

/* PHOTO */
.photo-preview { width: 100%; border-radius: 10px; margin-bottom: 10px; max-height: 200px; object-fit: cover; display: none; }
.file-input { display: none; }
.photo-btn {
  width: 100%; background: var(--surface2); border: 1.5px dashed var(--border);
  border-radius: 10px; padding: 20px; color: var(--muted);
  font-size: 13px; cursor: pointer; text-align: center;
  transition: all 0.15s; margin-bottom: 10px;
}
.photo-btn:active { border-color: var(--accent); color: var(--accent); }

.report-photo { width: 100%; border-radius: 10px; margin-bottom: 8px; max-height: 180px; object-fit: cover; }

/* HISTORY */
.hist-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.hist-item:last-child { border-bottom: none; }
.hist-left { flex: 1; }
.hist-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.hist-date { font-size: 11px; color: var(--muted); }
.hist-amount { font-family: var(--display); font-size: 13px; font-weight: 700; }
.hist-fine { color: var(--red); }
.hist-paid { color: var(--green); }

.section-title {
  font-family: var(--display); font-size: 10px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 10px; margin-top: 4px;
}

.empty { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 13px; line-height: 1.7; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; backdrop-filter: blur(6px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 18px 18px 38px; width: 100%; border-top: 1px solid var(--border); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: var(--display); font-size: 14px; font-weight: 700; margin-bottom: 16px; }

.field { margin-bottom: 11px; }
.field label { display: block; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.field input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 11px 13px; color: var(--text);
  font-family: var(--body); font-size: 14px; outline: none;
  transition: border-color 0.15s; -webkit-appearance: none;
}
.field input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 10px; margin-top: 12px; }

/* TIMER */
.timer-text { font-size: 11px; color: var(--orange); margin-top: 4px; }

/* TOAST */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 18px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.25s; z-index: 300;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; flex-direction: column; gap: 12px;
}
.loading-spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Загрузка...</div>
</div>

<!-- ONBOARDING -->
<div id="s-onboard" class="screen">
  <div class="ob-flame">🔥</div>
  <div class="ob-title">Accountability</div>
  <p class="ob-sub">Система ответственности.<br>Выбери роль при первом входе.</p>
  <button class="role-btn student" onclick="startRegister('student')">
    <div class="role-icon">🎯</div>
    <div>
      <div class="role-text-name">Я ученик</div>
      <div class="role-text-desc">Ставлю задачи, отправляю фото-отчёты</div>
    </div>
  </button>
  <button class="role-btn coach" onclick="startRegister('coach')">
    <div class="role-icon">🏆</div>
    <div>
      <div class="role-text-name">Я тренер</div>
      <div class="role-text-desc">Подтверждаю задачи и проверяю отчёты</div>
    </div>
  </button>
  <div class="ob-waiting" id="ob-waiting"></div>
</div>

<!-- PIN -->
<div id="s-pin" class="screen">
  <div class="pin-title" id="pin-title">Придумай PIN-код</div>
  <div class="pin-sub" id="pin-sub">4 цифры — твой ключ входа</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinInput('1')">1</div>
    <div class="pin-key" onclick="pinInput('2')">2</div>
    <div class="pin-key" onclick="pinInput('3')">3</div>
    <div class="pin-key" onclick="pinInput('4')">4</div>
    <div class="pin-key" onclick="pinInput('5')">5</div>
    <div class="pin-key" onclick="pinInput('6')">6</div>
    <div class="pin-key" onclick="pinInput('7')">7</div>
    <div class="pin-key" onclick="pinInput('8')">8</div>
    <div class="pin-key" onclick="pinInput('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinInput('0')">0</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
</div>

<!-- APP -->
<div id="s-app" class="screen">
  <div class="app-top">
    <div class="app-top-row">
      <div class="app-wordmark">ACCOUNTABILITY</div>
      <div class="role-pill" id="role-pill"></div>
    </div>
    <div class="debt-display">
      <div class="debt-label" id="debt-label">Долг</div>
      <div class="debt-number" id="debt-number">0</div>
      <div class="debt-rub">рублей</div>
    </div>
  </div>

  <div class="tab-content">
    <!-- УЧЕНИК: задачи -->
    <div class="tab-pane" id="tab-tasks"></div>
    <!-- УЧЕНИК: история -->
    <div class="tab-pane" id="tab-history"></div>
    <!-- ТРЕНЕР: входящие -->
    <div class="tab-pane" id="tab-inbox"></div>
    <!-- ТРЕНЕР: все задачи -->
    <div class="tab-pane" id="tab-all"></div>
  </div>

  <nav class="bottom-nav" id="nav-student" style="display:none">
    <button class="nav-btn" onclick="switchTab('tasks','nav-student',this)">
      <span class="nav-icon">📋</span>Задачи
    </button>
    <button class="nav-btn" onclick="switchTab('history','nav-student',this)">
      <span class="nav-icon">📜</span>История
    </button>
  </nav>

  <nav class="bottom-nav" id="nav-coach" style="display:none">
    <button class="nav-btn" onclick="switchTab('inbox','nav-coach',this)">
      <span class="nav-icon">📨</span>Входящие
    </button>
    <button class="nav-btn" onclick="switchTab('all','nav-coach',this)">
      <span class="nav-icon">📋</span>Все задачи
    </button>
  </nav>

  <button class="btn-fab" id="fab" onclick="openModal('m-task')" style="display:none">＋</button>
</div>

<!-- MODAL: НОВАЯ ЗАДАЧА -->
<div class="modal-overlay" id="m-task">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новая задача</div>
    <div class="field"><label>Задача</label><input type="text" id="t-name" placeholder="Например: выпить витамины"></div>
    <div class="field"><label>Дедлайн</label><input type="datetime-local" id="t-dl"></div>
    <div class="field"><label>Штраф (₽)</label><input type="number" id="t-fine" placeholder="500" inputmode="numeric"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('m-task')">Отмена</button>
      <button class="btn btn-primary" style="flex:2" onclick="createTask()">Создать</button>
    </div>
  </div>
</div>

<!-- MODAL: ФОТО ОТЧЁТ -->
<div class="modal-overlay" id="m-report">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Фото-отчёт</div>
    <input type="file" accept="image/*" capture="environment" class="file-input" id="photo-input" onchange="onPhotoSelected(this)">
    <img id="photo-preview" class="photo-preview">
    <div class="photo-btn" onclick="document.getElementById('photo-input').click()">
      📷 Нажми чтобы сделать фото
    </div>
    <input type="hidden" id="r-tid">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('m-report')">Отмена</button>
      <button class="btn btn-primary" style="flex:2" onclick="submitReport()">Отправить тренеру</button>
    </div>
  </div>
</div>

<!-- MODAL: ОПЛАТА -->
<div class="modal-overlay" id="m-pay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Оплата долга</div>
    <div class="field"><label>Сумма (₽)</label><input type="number" id="p-amount" placeholder="1000" inputmode="numeric"></div>
    <div class="field"><label>Комментарий</label><input type="text" id="p-note" placeholder="Перевёл на карту"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('m-pay')">Отмена</button>
      <button class="btn btn-primary" style="flex:2" onclick="submitPayment()">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// STATE
let S = {
  pins: {}, roles: [], role: null,
  debt: 0, tasks: [], payments: [], history: []
};

let photoBase64 = null;

// STORAGE
const BIN_ID = '6a418902f5f4af5e293e9047';
const API_KEY = '$2a$10$O.QnY26A0QLeud4xNtUmeOw5MS9nB1D6C1dmvPSl85WUEnwZKyE1i';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

async function save() {
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(S)
    });
  } catch(e) { console.error('Save error', e); }
}

async function load() {
  try {
    const r = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!r.ok) return false;
    const data = await r.json();
    if (data && data.pins !== undefined) { S = data; return true; }
    if (data && data.record) { S = data.record; return true; }
  } catch(e) { console.error('Load error', e); }
  return false;
}

// PIN
let pinMode = '', pinBuf = '', pinConfirm = '', pinStep = 1;

function startRegister(role) {
  pinMode = 'register-' + role;
  pinStep = 1; pinBuf = ''; pinConfirm = '';
  document.getElementById('pin-title').textContent = role === 'student' ? '🎯 Придумай PIN-код' : '🏆 Придумай PIN-код';
  document.getElementById('pin-sub').textContent = '4 цифры — твой ключ входа';
  document.getElementById('pin-error').textContent = '';
  updateDots(); showScreen('pin');
}

function showLoginPin() {
  pinMode = 'login'; pinStep = 1; pinBuf = ''; pinConfirm = '';
  document.getElementById('pin-title').textContent = 'Добро пожаловать 👋';
  document.getElementById('pin-sub').textContent = 'Введи свой PIN-код для входа';
  document.getElementById('pin-error').textContent = '';
  updateDots(); showScreen('pin');
}

function pinInput(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d; updateDots();
  if (pinBuf.length === 4) setTimeout(handlePin, 150);
}

function pinDel() { pinBuf = pinBuf.slice(0, -1); updateDots(); }

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).className = 'pin-dot' + (i < pinBuf.length ? ' filled' : '');
}

async function handlePin() {
  if (pinMode === 'login') {
    let found = null;
    for (const [role, pin] of Object.entries(S.pins)) { if (pin === pinBuf) { found = role; break; } }
    if (found) {
      S.role = found; await save(); launchApp();
    } else {
      document.getElementById('pin-error').textContent = 'Неверный PIN-код, попробуй снова';
      pinBuf = ''; updateDots();
    }
    return;
  }
  const role = pinMode.replace('register-', '');
  if (pinStep === 1) {
    pinConfirm = pinBuf; pinBuf = ''; pinStep = 2;
    document.getElementById('pin-sub').textContent = 'Повтори PIN-код для подтверждения';
    updateDots();
  } else {
    if (pinBuf === pinConfirm) {
      S.pins[role] = pinBuf;
      if (!S.roles.includes(role)) S.roles.push(role);
      S.role = role; await save(); launchApp();
    } else {
      document.getElementById('pin-error').textContent = 'PIN-коды не совпадают, начни заново';
      pinBuf = ''; pinStep = 1;
      document.getElementById('pin-sub').textContent = '4 цифры — твой ключ входа';
      updateDots();
    }
  }
}

// INIT
async function init() {
  document.getElementById('loading').style.display = 'flex';
  const ok = await load();
  document.getElementById('loading').style.display = 'none';
  checkDeadlines();

  if (!ok || S.roles.length === 0) { showOnboard(); return; }
  if (S.roles.length >= 2) { showLoginPin(); return; }
  showOnboard();
}

function showOnboard() {
  const w = document.getElementById('ob-waiting');
  const sb = document.querySelector('.role-btn.student');
  const cb = document.querySelector('.role-btn.coach');
  sb.style.display = 'flex'; cb.style.display = 'flex'; w.style.display = 'none';
  if (S.roles.includes('student') && !S.roles.includes('coach')) {
    sb.style.display = 'none';
    w.style.display = 'block';
    w.textContent = '✅ Ученик зарегистрирован. Жди пока тренер войдёт.';
  } else if (S.roles.includes('coach') && !S.roles.includes('student')) {
    cb.style.display = 'none';
    w.style.display = 'block';
    w.textContent = '✅ Тренер зарегистрирован. Жди пока ученик войдёт.';
  }
  showScreen('onboard');
}

function launchApp() {
  const r = S.role;
  document.getElementById('role-pill').textContent = r === 'student' ? 'УЧЕНИК' : 'ТРЕНЕР';
  document.getElementById('role-pill').className = 'role-pill ' + (r === 'student' ? 'pill-student' : 'pill-coach');
  document.getElementById('debt-label').textContent = r === 'student' ? 'Мой долг' : 'Долг ученика';
  document.getElementById('nav-student').style.display = r === 'student' ? 'flex' : 'none';
  document.getElementById('nav-coach').style.display = r === 'coach' ? 'flex' : 'none';
  document.getElementById('fab').style.display = r === 'student' ? 'flex' : 'none';

  const firstTab = r === 'student' ? 'tasks' : 'inbox';
  const firstNav = r === 'student' ? 'nav-student' : 'nav-coach';
  const firstBtn = document.querySelector('#' + firstNav + ' .nav-btn');
  switchTab(firstTab, firstNav, firstBtn);

  showScreen('app');
  render();

  // Auto-refresh every 30 sec
  setInterval(async () => {
    await load(); render();
  }, 30000);
}

// TABS
function switchTab(name, navId, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('#' + navId + ' .nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// RENDER
function render() {
  document.getElementById('debt-number').textContent = S.debt;
  if (S.role === 'student') { renderTasks(); renderHistory(); }
  else { renderInbox(); renderAll(); }
}

function timeLeft(deadline, fromNow) {
  const diff = new Date(deadline) - (fromNow || new Date());
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}

function deadlineStr(dl) {
  return new Date(dl).toLocaleString('ru', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// STUDENT
function renderTasks() {
  const el = document.getElementById('tab-tasks');
  const active = S.tasks.filter(t => ['pending','active','reported'].includes(t.status));
  let html = '<div class="section-title">Мои задачи</div>';
  if (!active.length) {
    html += '<div class="empty"><div class="empty-icon">📋</div>Нет активных задач.<br>Нажми + чтобы создать.</div>';
  } else {
    html += active.map(t => studentTaskCard(t)).join('');
  }
  // Pay button if debt > 0
  if (S.debt > 0) {
    html += `<button class="btn btn-primary" style="margin-top:8px" onclick="openModal('m-pay')">💸 Оплатить долг ${S.debt}₽</button>`;
  }
  el.innerHTML = html;
}

function studentTaskCard(t) {
  const dl = new Date(t.deadline);
  const now = new Date();
  const over = dl < now;
  const soon = dl - now < 3600000 && !over;
  const dlStr = deadlineStr(t.deadline);

  const badges = {
    pending: '<span class="badge badge-wait">⏳ Ждёт подтверждения тренера</span>',
    active: '<span class="badge badge-active">● Активна</span>',
    reported: '<span class="badge badge-reported">📸 Отчёт отправлен</span>',
    done: '<span class="badge badge-done">✓ Выполнено</span>',
    failed: '<span class="badge badge-failed">✗ Провалено</span>',
    burned: '<span class="badge badge-burned">— Сгорела</span>',
  };

  let actions = '';
  if (t.status === 'active' && !over) {
    actions = `<div class="card-actions"><button class="btn btn-green" onclick="openReport('${t.id}')">📸 Отправить фото</button></div>`;
  }
  if (t.status === 'active' && over) {
    actions = `<div class="card-actions"><button class="btn btn-orange" onclick="openReport('${t.id}')">📸 Отправить фото (просрочено)</button></div>`;
  }

  let photoHtml = '';
  if (t.photo && t.status === 'reported') {
    photoHtml = `<img src="${t.photo}" class="report-photo">`;
  }

  return `<div class="card">
    <div class="card-top"><div class="card-name">${t.name}</div><div class="card-fine">−${t.fine}₽</div></div>
    <div class="card-deadline ${over&&t.status==='active'?'overdue':soon?'soon':''}">⏰ ${dlStr}${over&&t.status==='active'?' · просрочено':''}</div>
    ${photoHtml}${badges[t.status]||''}${actions}
  </div>`;
}

function renderHistory() {
  const el = document.getElementById('tab-history');
  let html = '<div class="section-title">История штрафов и оплат</div>';
  if (!S.history.length) {
    html += '<div class="empty"><div class="empty-icon">📜</div>История пуста</div>';
  } else {
    html += '<div class="card">' + S.history.slice().reverse().map(h => `
      <div class="hist-item">
        <div class="hist-left">
          <div class="hist-name">${h.name}</div>
          <div class="hist-date">${new Date(h.date).toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="hist-amount ${h.type==='fine'?'hist-fine':'hist-paid'}">${h.type==='fine'?'−':'+'}${h.amount}₽</div>
      </div>`).join('') + '</div>';
  }
  el.innerHTML = html;
}

// COACH
function renderInbox() {
  const el = document.getElementById('tab-inbox');
  let html = '';

  // New tasks to confirm
  const newTasks = S.tasks.filter(t => t.status === 'pending');
  if (newTasks.length) {
    html += '<div class="section-title">Новые задачи — подтверди</div>';
    html += newTasks.map(coachNewTaskCard).join('');
  }

  // Reports to review
  const reports = S.tasks.filter(t => t.status === 'reported');
  if (reports.length) {
    html += '<div class="section-title" style="margin-top:16px">Фото-отчёты на проверку</div>';
    html += reports.map(coachReportCard).join('');
  }

  // Overdue to confirm
  const overdue = S.tasks.filter(t => t.status === 'overdue');
  if (overdue.length) {
    html += '<div class="section-title" style="margin-top:16px">Просроченные задачи</div>';
    html += overdue.map(coachOverdueCard).join('');
  }

  // Payment requests
  const pays = S.payments.filter(p => p.status === 'pending');
  if (pays.length) {
    html += '<div class="section-title" style="margin-top:16px">Запросы на оплату</div>';
    html += pays.map(payCard).join('');
  }

  if (!newTasks.length && !reports.length && !overdue.length && !pays.length) {
    html = '<div class="empty"><div class="empty-icon">✅</div>Всё проверено.<br>Новых входящих нет.</div>';
  }

  el.innerHTML = html;
}

function coachNewTaskCard(t) {
  return `<div class="card">
    <div class="card-top"><div class="card-name">${t.name}</div><div class="card-fine">−${t.fine}₽</div></div>
    <div class="card-deadline">⏰ ${deadlineStr(t.deadline)}</div>
    <span class="badge badge-wait">Ждёт подтверждения</span>
    <div class="card-actions">
      <button class="btn btn-green" onclick="confirmTask('${t.id}')">✓ Видел, подтверждаю</button>
    </div>
  </div>`;
}

function coachReportCard(t) {
  return `<div class="card">
    <div class="card-top"><div class="card-name">${t.name}</div><div class="card-fine">−${t.fine}₽</div></div>
    ${t.photo ? `<img src="${t.photo}" class="report-photo">` : ''}
    <span class="badge badge-reported">📸 Фото получено</span>
    <div class="card-actions">
      <button class="btn btn-green" onclick="reviewTask('${t.id}',true)">✓ Принять</button>
      <button class="btn btn-red" onclick="reviewTask('${t.id}',false)">✗ Отклонить</button>
    </div>
  </div>`;
}

function coachOverdueCard(t) {
  const expireAt = new Date(new Date(t.overdueAt).getTime() + 12*3600000);
  const left = timeLeft(expireAt);
  return `<div class="card">
    <div class="card-top"><div class="card-name">${t.name}</div><div class="card-fine">−${t.fine}₽</div></div>
    <div class="card-deadline overdue">Просрочено ${deadlineStr(t.deadline)}</div>
    ${left ? `<div class="timer-text">⏳ Сгорит через ${left}</div>` : ''}
    <div class="card-actions">
      <button class="btn btn-orange" onclick="confirmOverdue('${t.id}')">👁 Видел просрочку → штраф</button>
    </div>
  </div>`;
}

function payCard(p) {
  return `<div class="card">
    <div class="card-top">
      <div class="card-name" style="font-family:var(--display);font-size:18px;color:var(--yellow)">${p.amount}₽</div>
      <span class="badge badge-wait">Ожидает</span>
    </div>
    ${p.note ? `<div style="font-size:12px;color:var(--muted);margin-bottom:10px">${p.note}</div>` : ''}
    <div class="card-actions">
      <button class="btn btn-green" onclick="reviewPayment('${p.id}',true)">✓ Подтвердить</button>
      <button class="btn btn-red" onclick="reviewPayment('${p.id}',false)">✗ Отклонить</button>
    </div>
  </div>`;
}

function renderAll() {
  const el = document.getElementById('tab-all');
  let html = '<div class="section-title">Все задачи ученика</div>';
  if (!S.tasks.length) {
    html += '<div class="empty"><div class="empty-icon">📋</div>Ученик ещё не создал задач</div>';
  } else {
    const badges = {
      pending: '<span class="badge badge-wait">⏳ Ждёт подтверждения</span>',
      active: '<span class="badge badge-active">● Активна</span>',
      reported: '<span class="badge badge-reported">📸 На проверке</span>',
      overdue: '<span class="badge badge-failed">⚠ Просрочена</span>',
      done: '<span class="badge badge-done">✓ Выполнено</span>',
      failed: '<span class="badge badge-failed">✗ Провалено</span>',
      burned: '<span class="badge badge-burned">— Сгорела</span>',
    };
    html += S.tasks.slice().reverse().map(t => `
      <div class="card">
        <div class="card-top"><div class="card-name">${t.name}</div><div class="card-fine">−${t.fine}₽</div></div>
        <div class="card-deadline">⏰ ${deadlineStr(t.deadline)}</div>
        ${badges[t.status]||''}
      </div>`).join('');
  }
  el.innerHTML = html;
}

// ACTIONS
async function createTask() {
  const name = document.getElementById('t-name').value.trim();
  const dl = document.getElementById('t-dl').value;
  const fine = parseInt(document.getElementById('t-fine').value);
  if (!name || !dl || !fine || fine <= 0) { toast('⚠️ Заполни все поля'); return; }
  S.tasks.push({
    id: Date.now().toString(), name, deadline: dl, fine,
    status: 'pending', photo: null, createdAt: new Date().toISOString()
  });
  await save(); closeModal('m-task'); render(); toast('✅ Задача создана! Ждёт подтверждения тренера.');
  document.getElementById('t-name').value = ''; document.getElementById('t-fine').value = '';
}

async function confirmTask(id) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  t.status = 'active';
  await save(); render(); toast('✅ Задача подтверждена!');
}

function openReport(id) {
  document.getElementById('r-tid').value = id;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  photoBase64 = null;
  openModal('m-report');
}

function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Compress image
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.6);
      const prev = document.getElementById('photo-preview');
      prev.src = photoBase64; prev.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitReport() {
  const id = document.getElementById('r-tid').value;
  if (!photoBase64) { toast('⚠️ Сделай фото'); return; }
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  t.status = 'reported';
  t.photo = photoBase64;
  t.reportedAt = new Date().toISOString();
  await save(); closeModal('m-report'); render(); toast('📸 Фото отправлено тренеру!');
  photoBase64 = null;
}

async function reviewTask(id, ok) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  t.photo = null; // Удаляем фото сразу
  if (ok) {
    t.status = 'done';
    toast('✅ Отчёт принят!');
  } else {
    t.status = 'failed';
    S.debt += t.fine;
    S.history.push({ type: 'fine', name: t.name, amount: t.fine, date: new Date().toISOString() });
    toast(`❌ Отклонено. Штраф ${t.fine}₽`);
  }
  await save(); render();
}

async function confirmOverdue(id) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  t.status = 'failed';
  S.debt += t.fine;
  S.history.push({ type: 'fine', name: t.name + ' (просрочено)', amount: t.fine, date: new Date().toISOString() });
  await save(); render(); toast(`⚠️ Просрочка подтверждена. Штраф ${t.fine}₽`);
}

async function submitPayment() {
  const amount = parseInt(document.getElementById('p-amount').value);
  const note = document.getElementById('p-note').value.trim();
  if (!amount || amount <= 0) { toast('⚠️ Укажи сумму'); return; }
  S.payments.push({ id: Date.now().toString(), amount, note, status: 'pending', createdAt: new Date().toISOString() });
  await save(); closeModal('m-pay'); render(); toast('💸 Запрос отправлен тренеру!');
  document.getElementById('p-amount').value = ''; document.getElementById('p-note').value = '';
}

async function reviewPayment(id, ok) {
  const p = S.payments.find(p => p.id === id);
  if (!p) return;
  if (ok) {
    p.status = 'confirmed';
    S.debt = Math.max(0, S.debt - p.amount);
    S.history.push({ type: 'paid', name: 'Оплата долга', amount: p.amount, date: new Date().toISOString() });
    toast(`✅ Оплата ${p.amount}₽ подтверждена`);
  } else {
    p.status = 'rejected';
    toast('❌ Оплата отклонена');
  }
  await save(); render();
}

// DEADLINES CHECK
function checkDeadlines() {
  const now = new Date(); let changed = false;
  S.tasks.forEach(t => {
    // Active → overdue
    if (t.status === 'active' && new Date(t.deadline) < now) {
      t.status = 'overdue';
      t.overdueAt = now.toISOString();
      changed = true;
    }
    // Overdue → burned (after 12h without coach confirmation)
    if (t.status === 'overdue' && t.overdueAt) {
      const expiry = new Date(new Date(t.overdueAt).getTime() + 12*3600000);
      if (now > expiry) { t.status = 'burned'; changed = true; }
    }
    // Pending → burned (if deadline passed without coach seeing it)
    if (t.status === 'pending' && new Date(t.deadline) < now) {
      t.status = 'burned'; changed = true;
    }
  });
  if (changed) { save(); render(); }
  setTimeout(checkDeadlines, 60000);
}

// UTILS
function showScreen(name) {
  const map = { onboard:'s-onboard', pin:'s-pin', app:'s-app' };
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(map[name]).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
